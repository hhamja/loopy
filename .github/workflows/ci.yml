name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Single source: the exact same checks are runnable locally with
      # `bash scripts/ci_local.sh`, so local and CI can never drift.
      # shellcheck and jq are preinstalled on ubuntu-latest.
      - name: local CI (shellcheck + syntax + manifest + budget + tests)
        run: bash scripts/ci_local.sh
