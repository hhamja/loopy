name: Release

# Manual/CD gate: pushing a version tag (e.g. v0.2.0) cuts a GitHub Release
# whose notes are the matching CHANGELOG.md section. Never fires on branch push.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract CHANGELOG section for this tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v v="$VERSION" '
            $0 ~ "^## " v "( |$)" { flag = 1; next }
            /^## / && flag { exit }
            flag { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::no CHANGELOG.md section found for version $VERSION" >&2
            exit 1
          fi
          echo "---- release notes ----"
          cat release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md
