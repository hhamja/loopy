name: notify-human-gate

# Solo-account mobile notification for the human merge gate.
# GitHub suppresses notifications for your OWN actions, so a self-opened or
# self-merged PR never pings you. A comment authored by github-actions[bot]
# is a DIFFERENT actor, so an @mention inside it is not self-suppressed —
# you get a "mention" push on GitHub Mobile. Fires when the harness (or you)
# labels a PR `ready-for-merge`, i.e. when human_gate == ready_for_merge.
on:
  pull_request:
    types: [labeled]

permissions:
  pull-requests: write

jobs:
  ping:
    if: github.event.label.name == 'ready-for-merge'
    runs-on: ubuntu-latest
    steps:
      # Values flow through env, never inlined into the script, so a crafted
      # PR title can't inject shell.
      - name: mention the owner on the PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          gh pr comment "$PR" --repo "$REPO" \
            --body "@$OWNER 🔔 human gate reached — ready for merge. PR #$PR: $TITLE"
