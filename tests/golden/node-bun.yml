name: loop-ci

# Generated by loopy /loop-ci from .claude/loop/loop.config.md.
# Runs the same test/lint/build the loop verifies, so CI and the loop agree.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: install
        run: bun install --frozen-lockfile
      # - name: lint
      #   run: TODO — set lint in .claude/loop/loop.config.md
      - name: test
        run: bun test
      - name: build
        run: bun run build
