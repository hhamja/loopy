name: loop-ci

# Generated by loop-harness /loop-ci from .claude/loop/loop.config.md.
# Runs the same test/lint/build the loop verifies, so CI and the loop agree.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - name: install
        run: npm ci
      # - name: lint
      #   run: TODO — set lint in .claude/loop/loop.config.md
      - name: test
        run: npm test
      # - name: build
      #   run: TODO — set build in .claude/loop/loop.config.md
